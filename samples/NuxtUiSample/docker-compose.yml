services:
  cosmo-api:
    build:
      context: ../..
      dockerfile: samples/NuxtUiSample/Dockerfile.backend
    container_name: nuxt-ui-sample-api
    restart: unless-stopped
    expose:
      - "9091"

  nuxt-web:
    build:
      context: ../..
      dockerfile: samples/NuxtUiSample/frontend/Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: /api
    container_name: nuxt-ui-sample-web
    restart: unless-stopped
    depends_on:
      - cosmo-api
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: nuxt-ui-sample-proxy
    restart: unless-stopped
    depends_on:
      - nuxt-web
      - cosmo-api
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
